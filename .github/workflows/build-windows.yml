name: Build Windows Installer

on:
  push:
    branches:
      - main
      - before
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Installer Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Diagnostiquer les dépendances
        run: |
          python -c "import PyQt6; print('PyQt6 OK:', PyQt6.__file__)"
          python -c "from PyQt6.QtWidgets import QApplication; print('QtWidgets OK')"
          python -c "import flask; print('Flask OK:', flask.__version__)"
          python -c "import sqlalchemy; print('SQLAlchemy OK:', sqlalchemy.__version__)"
          python -c "import flask_limiter; print('Flask-Limiter OK:', flask_limiter.__version__)"
          pip list | findstr -i "pyqt pyinstaller flask"

      - name: Télécharger cloudflared Windows
        run: |
          $url = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          New-Item -ItemType Directory -Force -Path "tunnel" | Out-Null
          Invoke-WebRequest -Uri $url -OutFile "tunnel\cloudflared.exe"
          $sizeMB = [math]::Round((Get-Item "tunnel\cloudflared.exe").Length / 1MB, 1)
          Write-Host "cloudflared.exe téléchargé : $sizeMB MB"
        shell: pwsh

      - name: Vérifier les assets (thèmes QSS + logo)
        run: |
          foreach ($f in @("vigile_theme.qss", "vigile_theme_light.qss")) {
            if (!(Test-Path $f)) {
              Write-Error "$f introuvable — requis par le build"
              exit 1
            }
            Write-Host "$f OK"
          }
          if (!(Test-Path "assets\logo\vigile.ico")) {
            Write-Error "assets\logo\vigile.ico introuvable"
            exit 1
          }
          Write-Host "assets\logo\vigile.ico OK"
        shell: pwsh

      - name: Build PyInstaller
        run: pyinstaller --clean vigile.spec

      - name: Vérifier le build
        run: |
          if (!(Test-Path "dist\Vigile\Vigile.exe")) {
            Write-Error "Vigile.exe introuvable dans dist\Vigile\"
            exit 1
          }
          $sizeMB = [math]::Round((Get-ChildItem -Recurse "dist\Vigile" | Measure-Object -Property Length -Sum).Sum / 1MB, 1)
          Write-Host "Build OK — dist\Vigile\Vigile.exe ($sizeMB MB total)"
        shell: pwsh

      - name: Vérifier les DLLs Qt
        run: |
          $qtDll = Get-ChildItem -Recurse "dist\Vigile" -Filter "Qt6Core*" | Select-Object -First 1
          if ($qtDll) {
            Write-Host "Qt6 DLL trouvée : $($qtDll.FullName)"
          } else {
            Write-Error "Aucune DLL Qt6 trouvée — le build est probablement incomplet"
            exit 1
          }
        shell: pwsh

      - name: Vérifier les thèmes embarqués
        run: |
          foreach ($qss in @("dist\Vigile\vigile_theme.qss", "dist\Vigile\vigile_theme_light.qss")) {
            if (!(Test-Path $qss)) {
              Write-Error "$qss absent du build — vérifier vigile.spec"
              exit 1
            }
            Write-Host "$qss embarqué OK"
          }
        shell: pwsh

      - name: Installer Inno Setup
        run: choco install innosetup --yes --no-progress
        shell: pwsh

      - name: Créer l'installateur
        run: |
          $iscc = Get-ChildItem "C:\Program Files (x86)" -Recurse -Filter "ISCC.exe" -ErrorAction SilentlyContinue |
                  Select-Object -First 1 -ExpandProperty FullName
          if (-not $iscc) {
            Write-Error "ISCC.exe introuvable — Inno Setup n'est pas installé correctement"
            exit 1
          }
          Write-Host "Inno Setup trouvé : $iscc"
          New-Item -ItemType Directory -Force -Path "installer_output" | Out-Null
          & $iscc packaging\windows\vigile.iss
        shell: pwsh

      - name: Vérifier l'installateur
        run: |
          $installer = Get-ChildItem "installer_output\*.exe" | Select-Object -First 1
          if (-not $installer) {
            Write-Error "Aucun installateur .exe trouvé dans installer_output\"
            exit 1
          }
          $sizeMB = [math]::Round($installer.Length / 1MB, 1)
          Write-Host "Installateur OK : $($installer.Name) ($sizeMB MB)"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VigileSetup-Windows-${{ github.sha }}
          path: installer_output\*.exe
          retention-days: 30
          if-no-files-found: error
