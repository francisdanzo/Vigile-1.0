name: Build Windows Installer

on:
  push:
    branches:
      - before
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout branche before
        uses: actions/checkout@v4
        with:
          ref: before

      - name: Installer Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt

      - name: Diagnostiquer les dépendances
        run: |
          python -c "import PyQt6; print('PyQt6 OK:', PyQt6.__file__)"
          python -c "from PyQt6.QtWidgets import QApplication; print('QtWidgets OK')"
          python -c "from PyQt6.QtCore import Qt; print('QtCore OK')"
          pip list | findstr -i pyqt

      - name: Build PyInstaller
        run: pyinstaller --clean vigile.spec

      - name: Vérifier le build
        run: |
          if (!(Test-Path "dist\Vigile\Vigile.exe")) {
            Write-Error "Vigile.exe introuvable dans dist\Vigile\"
            exit 1
          }
          Write-Host "Build OK : dist\Vigile\Vigile.exe trouvé"
          # Afficher la taille du dossier pour diagnostic
          $size = (Get-ChildItem -Recurse "dist\Vigile" | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "Taille totale du build: $([math]::Round($size, 2)) MB"

      - name: Vérifier les DLLs Qt
        run: |
          $qtCore = Get-ChildItem -Recurse "dist\Vigile" -Filter "QtCore*" | Select-Object -First 1
          if ($qtCore) {
            Write-Host "Qt DLLs trouvées: $($qtCore.FullName)"
          } else {
            Write-Error "ATTENTION: Aucune DLL Qt trouvée dans le build!"
            exit 1
          }

      - name: Installer Inno Setup
        run: choco install innosetup --yes

      - name: Créer l'installateur
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" `
            packaging\windows\vigile.iss

      - name: Vérifier l'installateur
        run: |
          if (!(Test-Path "installer_output\VigileSetup-1.0.0.exe")) {
            Write-Error "Installateur introuvable"
            exit 1
          }
          $size = (Get-Item "installer_output\VigileSetup-1.0.0.exe").Length / 1MB
          Write-Host "Installateur OK: $([math]::Round($size, 2)) MB"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VigileSetup-Windows
          path: installer_output\VigileSetup-1.0.0.exe
          retention-days: 30
